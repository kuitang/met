openapi: 3.1.0
info:
  title: MuseWalk API
  version: 1.0.0
  description: >
    The entire dynamic API for MuseWalk. Everything else (autocomplete,
    FTS search, routing, map, positioning fusion) runs client-local against the
    downloaded met.sqlite artifact. All LLM use is encapsulated server-side
    behind these routes.
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html

paths:
  /api/v1/data/version:
    get:
      operationId: getDataVersion
      summary: Current met.sqlite artifact version
      responses:
        "200":
          description: Artifact version metadata
          headers:
            x-data-version:
              $ref: "#/components/headers/XDataVersion"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataVersion"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/museums:
    get:
      operationId: getMuseums
      summary: Museums contained in the current artifact
      description: >
        The multi-museum manifest: registry identity, sites (buildings with
        entrances + floor order), data fidelity/capabilities, licensing
        attribution, per-museum freshness. Read from the artifact's meta —
        the client sees identical facts offline from its downloaded copy.
      responses:
        "200":
          description: Museum manifest
          headers:
            x-data-version:
              $ref: "#/components/headers/XDataVersion"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MuseumManifest"
        "503":
          description: Artifact not yet available (data_unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/data/met.sqlite:
    get:
      operationId: getDatabase
      summary: Download the met.sqlite artifact
      description: >
        Versioned binary download. ETag equals dataVersion; clients send
        If-None-Match and re-download only on version change.
      parameters:
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: The SQLite database file
          headers:
            ETag:
              description: Equals the current dataVersion
              schema:
                type: string
            x-data-version:
              $ref: "#/components/headers/XDataVersion"
          content:
            application/octet-stream:
              schema:
                type: string
                contentMediaType: application/octet-stream
        "304":
          description: Client copy is current (If-None-Match matched)
          headers:
            x-data-version:
              $ref: "#/components/headers/XDataVersion"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/img/{objectID}:
    get:
      operationId: getObjectImage
      summary: Cached proxy for an object's Met CDN image
      description: >
        Disk-cached pass-through of objects.imageUrl from met.sqlite. Exists
        because images.metmuseum.org sends no CORS/CORP headers, which the
        web client's COEP (require-corp, needed for SharedArrayBuffer /
        expo-sqlite) would block. Only objectIDs present in the catalog with a
        non-empty imageUrl are served, so this is not an open proxy. The
        objectID→image mapping is stable, so responses are immutable; clients
        cache-bust with ?v={dataVersion} when the catalog updates.
      parameters:
        - name: objectID
          in: path
          required: true
          schema:
            type: integer
        - name: v
          in: query
          required: false
          description: Cache-buster; clients pass the current dataVersion.
          schema:
            type: string
      responses:
        "200":
          description: Image bytes (Met CDN pass-through; in practice JPEG)
          headers:
            Cache-Control:
              description: "public, max-age=31536000, immutable"
              schema:
                type: string
            Access-Control-Allow-Origin:
              description: Always "*" (images are public CC0)
              schema:
                type: string
            x-data-version:
              $ref: "#/components/headers/XDataVersion"
          content:
            image/jpeg:
              schema:
                type: string
                contentMediaType: image/jpeg
        "404":
          description: Unknown objectID, or the object has no image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          description: Upstream Met CDN fetch failed or timed out (never cached)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/search/interpret:
    post:
      operationId: interpretSearch
      summary: LLM query interpretation, executed and ranked server-side
      description: >
        One client round trip. The server rewrites the natural-language query
        to an FTS query (escalating to a bounded agentic loop when the rewrite
        yields <3 rows or only low-signal bm25 scores), executes it against
        its met.sqlite, and returns final ranked results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterpretRequest"
      responses:
        "200":
          description: Final ranked results
          headers:
            x-data-version:
              $ref: "#/components/headers/XDataVersion"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterpretResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/locate/photo:
    post:
      operationId: locatePhoto
      summary: Locate the user from a photo
      description: >
        Two concurrent server-side paths: wall-label OCR (deterministic
        met.sqlite match when legible) and image-embedding retrieval against
        the on-view index (top-3 candidates). Clients downscale before upload;
        decoded image must be ≤4 MB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocatePhotoRequest"
      responses:
        "200":
          description: Label match (if a label was legible) and retrieval candidates
          headers:
            x-data-version:
              $ref: "#/components/headers/XDataVersion"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocatePhotoResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/health:
    get:
      operationId: getHealth
      summary: Liveness and dependency status
      responses:
        "200":
          description: Server status
          headers:
            x-data-version:
              $ref: "#/components/headers/XDataVersion"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        default:
          $ref: "#/components/responses/Error"

components:
  headers:
    XDataVersion:
      description: >
        Current met.sqlite dataVersion. Sent on every API response so a stale
        client knows to re-pull /api/v1/data/met.sqlite.
      schema:
        type: string

  responses:
    Error:
      description: >
        Standard error envelope. Codes include invalid_request (400),
        not_found (404), payload_too_large (413), not_implemented (501),
        budget_exhausted (503, daily LLM cap tripped), internal (500).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimited:
      description: Per-IP rate limit exceeded; retry after the indicated delay.
      headers:
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            retryAfter:
              type: integer
              description: Seconds until retry is sensible (present on 429/503)

    DataVersion:
      type: object
      required: [dataVersion, sqliteBytes, builtAt]
      properties:
        dataVersion:
          type: string
        sqliteBytes:
          type: integer
          description: Size of met.sqlite in bytes (0 until first build)
        builtAt:
          type: string
          format: date-time

    SiteMeta:
      type: object
      required: [siteId, name, entrance, floorOrder]
      properties:
        siteId:
          type: string
          description: Globally unique site id ("fifthAve", "louvre:main", …)
        name:
          type: string
        entrance:
          type: object
          required: [lat, lon]
          properties:
            lat:
              type: number
            lon:
              type: number
            floor:
              type: string
        floorOrder:
          type: array
          items:
            type: string
          description: Floor labels in display order (bottom → top)

    MuseumEntry:
      type: object
      required: [id, name, shortName, city, country, sites, fidelity, license, capabilities]
      properties:
        id:
          type: string
        name:
          type: string
        shortName:
          type: string
        city:
          type: string
        country:
          type: string
        sites:
          type: array
          items:
            $ref: "#/components/schemas/SiteMeta"
        fidelity:
          type: string
          enum: [routed, room-labels, museum-only]
        license:
          type: object
          required: [text, images, attribution, termsUrl]
          properties:
            text:
              type: string
            images:
              type: string
              description: Default image-derivative license; "" = none allowed
            attribution:
              type: string
            termsUrl:
              type: string
            ttlDays:
              type: integer
              description: >-
                Non-commercial-use TTL in days for sources whose terms cap
                how long fetched content may be cached/served (e.g. V&A: 4
                weeks). When set, the license-TTL mechanism hides this
                museum's rows once the shipped artifact is older than
                ttlDays - 1 (see ARCHITECTURE.md "Provenance & the
                license-TTL mechanism").
        objectUrlTemplate:
          type: string
          description: Object deep-link template; "{sourceId}" replaced per record
        capabilities:
          type: object
          required: [hasGeometry, hasGraph, granularity, languages]
          properties:
            hasGeometry:
              type: boolean
            hasGraph:
              type: boolean
            granularity:
              type: string
              enum: [room, gallery-label, museum]
            languages:
              type: array
              items:
                type: string
        counts:
          type: object
          properties:
            objects:
              type: integer
        fetchedAt:
          type: string
          nullable: true
          description: When this museum's records were last confirmed from source

    MuseumManifest:
      type: object
      required: [dataVersion, builtAt, museums]
      properties:
        dataVersion:
          type: string
        builtAt:
          type: string
          format: date-time
        museums:
          type: array
          items:
            $ref: "#/components/schemas/MuseumEntry"

    Health:
      type: object
      required: [ok, dataVersion, llm]
      properties:
        ok:
          type: boolean
        dataVersion:
          type: string
        llm:
          type: string
          enum: [up, degraded]

    InterpretRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 500
        maxResults:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        museum:
          type: string
          description: >-
            Optional museum registry id ("met", "aic", …) to scope
            interpretation and execution to one museum (schema v2
            multi-museum artifacts; the client's ScopeChips "AT {museum}"
            selection). Omitted = search across every museum in the artifact.

    InterpretedQuery:
      type: object
      required: [ftsQuery, filters]
      properties:
        ftsQuery:
          type: string
          description: The FTS5 query the server executed
        filters:
          type: object
          properties:
            artist:
              type: string
            classification:
              type: string
            material:
              type: string
            culture_or_period:
              type: string

    SearchResult:
      type: object
      required: [objectID, title, artist, galleryNumber, floor, site, score]
      properties:
        objectID:
          type: integer
        title:
          type: string
        artist:
          type: string
        galleryNumber:
          type: string
        floor:
          type: string
        site:
          type: string
          enum: [fifthAve, cloisters]
        score:
          type: number

    InterpretResponse:
      type: object
      required: [results, method, interpretedQuery]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        method:
          type: string
          enum: [rewrite, agentic]
        interpretedQuery:
          $ref: "#/components/schemas/InterpretedQuery"
        why:
          type: string
          description: One-line explanation (agentic path only)

    LocatePhotoRequest:
      type: object
      required: [imageBase64]
      properties:
        imageBase64:
          type: string
          contentEncoding: base64
          description: JPEG/PNG bytes, base64-encoded; decoded size ≤4 MB
          maxLength: 5592416

    LabelMatch:
      type: object
      required: [objectID, gallery, floor, accession, confidence]
      properties:
        objectID:
          type: integer
        gallery:
          type: string
        floor:
          type: string
        accession:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1

    LocateCandidate:
      type: object
      required: [objectID, title, artist, gallery, floor, similarity]
      properties:
        objectID:
          type: integer
        title:
          type: string
        artist:
          type: string
        gallery:
          type: string
        floor:
          type: string
        similarity:
          type: number

    LocatePhotoResponse:
      type: object
      required: [candidates]
      properties:
        label:
          oneOf:
            - $ref: "#/components/schemas/LabelMatch"
            - type: "null"
          description: Deterministic wall-label match; null if no label legible
        candidates:
          type: array
          maxItems: 3
          items:
            $ref: "#/components/schemas/LocateCandidate"
