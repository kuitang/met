# Repo-local gitleaks config (picked up by the global pre-commit hook).
[extend]
useDefault = true

[allowlist]
description = "App Store Connect API key ISSUER id in eas.json — a public identifier (like the key id); the actual secret is the local ~/AuthKey_*.p8, never committed"
regexes = ['''71e0beb7-1b5c-4170-b7f4-bb85f2aaf4db''']
