# PR preview apps: one Fly app per PR (met-nav-pr-{n}), deployed on open/push,
# destroyed on close. Uses the org-wide FLY_PREVIEW_TOKEN (app creation needs
# org scope). The action at 1.5.0 supports Docker build secrets natively
# (`build_secrets` input → `flyctl deploy --build-secret …`, verified against
# the tagged source), so the same Dockerfile/Tigris bake path works for
# previews. VM sizing: cpu=1 + cpukind=shared + memory=512 ≡ shared-cpu-1x/512MB
# (the action's `vmsize` input is dead code at 1.5.0 — it gates on an
# undeclared INPUT_VM — so the cpu/cpukind/memory inputs are the working form).
name: preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write # preview URL comment

jobs:
  preview:
    # Forked PRs get no secrets; only deploy previews for same-repo branches.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_PREVIEW_TOKEN }}
      FLY_ORG: personal
      FLY_REGION: ewr
    steps:
      - uses: actions/checkout@v4

      - name: Deploy / update / destroy preview app
        id: deploy
        uses: superfly/fly-pr-review-apps@1.5.0
        with:
          name: met-nav-pr-${{ github.event.number }}
          region: ewr
          org: personal
          cpu: 1
          cpukind: shared
          memory: 512
          secrets: >-
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            LLM_DAILY_BUDGET=${{ secrets.PREVIEW_GEMINI_BUDGET }}
          build_secrets: >-
            AWS_ACCESS_KEY_ID=${{ secrets.TIGRIS_AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.TIGRIS_AWS_SECRET_ACCESS_KEY }}
            AWS_ENDPOINT_URL_S3=${{ secrets.TIGRIS_AWS_ENDPOINT }}

      - name: Comment preview URL on the PR
        if: github.event.action != 'closed' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- met-nav-preview -->';
            const body = `${marker}\n🚀 Preview app deployed: ${process.env.PREVIEW_URL}\n\n` +
              `(real data + real Gemini, daily LLM budget 100; app is destroyed when this PR closes)`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
